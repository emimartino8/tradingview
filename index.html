<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
    <meta name="theme-color" content="#1e1e1e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>My Trading View</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            max-width: 100%;
            height: 100%;
            overflow: hidden;
            background: #121212;
            color: #e0e0e0;
            font-family: sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        * {
            scrollbar-width: thin;
            scrollbar-color: #354052 #0c0f14;
        }

        *::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        *::-webkit-scrollbar-track {
            background: #0c0f14;
        }

        *::-webkit-scrollbar-thumb {
            background: #354052;
            border-radius: 999px;
            border: 2px solid #0c0f14;
        }

        *::-webkit-scrollbar-thumb:hover {
            background: #4a5870;
        }

        .tabs {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: rgba(13, 17, 24, 0.98);
            border-bottom: 1px solid rgba(82, 96, 122, 0.28);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
            backdrop-filter: blur(10px);
            z-index: 1000;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: #354052 transparent;
            cursor: grab;
            user-select: none;
        }

        .tabs::-webkit-scrollbar {
            height: 4px;
        }

        .tabs::-webkit-scrollbar-track {
            background: transparent;
        }

        .tabs::-webkit-scrollbar-thumb {
            background: #354052;
            border-radius: 999px;
            border: 0;
        }

        .tabs:active {
            cursor: grabbing;
        }

        .tabs button {
            flex: none;
            width: auto;
            min-width: 112px;
            height: 36px;
            border: 1px solid transparent;
            border-radius: 7px;
            background: transparent;
            cursor: pointer;
            color: #b8c1d1;
            font: inherit;
            font-size: 0.88rem;
            font-weight: 600;
            transition: background .18s ease, color .18s ease, border-color .18s ease, box-shadow .18s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 0 0 auto;
        }

        .tabs button:hover {
            border-color: rgba(142, 197, 255, 0.18);
            background: rgba(142, 197, 255, 0.06);
            color: #e6eefb;
        }

        .tabs button.active {
            border-color: rgba(142, 197, 255, 0.24);
            color: #8ec5ff;
            background: #20304a;
            box-shadow: inset 0 0 0 1px rgba(142, 197, 255, 0.05);
            font-weight: 800;
        }

        #tab-contents {
            position: absolute;
            top: 50px;
            bottom: 0;
            left: 0;
            right: 0;
            overflow: hidden;
        }

        .tab-content {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .tradingview-widget-container {
            width: 100%;
            height: 100%;
        }

        .tradingview-widget-container__widget {
            width: 100%;
            height: 100%;
        }

        .tradingview-widget-copyright {
            display: none !important;
        }

        .watchlist-view {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            background: #0f1115;
            overflow: hidden;
        }

        .watchlist-toolbar {
            flex: none;
            position: sticky;
            top: 0;
            z-index: 5;
            width: 100%;
            max-width: 100vw;
            min-height: 64px;
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto auto;
            align-items: center;
            gap: 10px 14px;
            padding: 9px 16px;
            border-bottom: 1px solid rgba(82, 96, 122, 0.28);
            background: rgba(13, 17, 24, 0.96);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .watchlist-title {
            min-width: 0;
            font-size: 1.05rem;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .watchlist-heading {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .watchlist-breadcrumb {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #78b8ff;
            font-size: 0.74rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .watchlist-breadcrumb-segment {
            border: 0;
            padding: 0;
            background: none;
            color: inherit;
            font: inherit;
            cursor: pointer;
        }

        .watchlist-breadcrumb-segment:hover {
            color: #c7ddff;
        }

        .watchlist-breadcrumb-current {
            color: #dbe8ff;
            cursor: default;
        }

        .watchlist-view-toggle {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 3px;
            border: 1px solid #313743;
            border-radius: 7px;
            background: #171a20;
        }

        .watchlist-view-button {
            min-width: 88px;
            height: 30px;
            border: 0;
            border-radius: 5px;
            background: transparent;
            color: #b8bec8;
            cursor: pointer;
            font: inherit;
            font-size: 0.78rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background .18s ease, color .18s ease;
        }

        .watchlist-view-button.active {
            background: #20304a;
            color: #8ec5ff;
            font-weight: 700;
        }

        .watchlist-subtitle {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 0 10px;
            border: 1px solid #2d3442;
            border-radius: 999px;
            background: #151922;
            font-size: 0.75rem;
            color: #b8c1d1;
            white-space: nowrap;
        }

        .watchlist-back {
            flex: none;
            width: 34px;
            height: 34px;
            border: 1px solid #303743;
            border-radius: 6px;
            background: #11161e;
            color: #eee;
            cursor: pointer;
            font-size: 1.2rem;
            line-height: 1;
            transition: background .18s ease, border-color .18s ease, transform .18s ease;
        }

        .watchlist-back:disabled {
            opacity: 0.4;
            cursor: default;
        }

        .watchlist-back:hover {
            background: #2d2d2d;
            border-color: #4f7bb8;
        }

        .category-grid {
            flex: 1;
            overflow: auto;
            display: grid;
            grid-template-columns: 1fr;
            grid-auto-rows: 330px;
            align-content: start;
            gap: 12px;
            padding: 12px 12px 24px;
            background: #0f1115;
        }

        .category-card {
            position: relative;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px;
            border: 1px solid #272d37;
            border-radius: 8px;
            background: linear-gradient(180deg, #171b22 0%, #11151b 100%);
            color: #e8e8e8;
            cursor: default;
            text-align: left;
            font: inherit;
            overflow: hidden;
            box-shadow: 0 10px 26px rgba(0, 0, 0, 0.16);
            transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease, background .18s ease;
            contain: content;
        }

        .category-card.is-navigable {
            cursor: pointer;
        }

        .category-card.is-navigable:hover,
        .category-card.is-navigable:focus-visible {
            border-color: #4f7bb8;
            background: linear-gradient(180deg, #1a202a 0%, #121820 100%);
            box-shadow: 0 16px 34px rgba(0, 0, 0, 0.28), 0 0 0 1px rgba(142, 197, 255, 0.08);
            transform: translateY(-2px);
            outline: none;
        }

        .category-card-title {
            flex: none;
            height: 22px;
            min-width: 0;
            font-size: 0.92rem;
            font-weight: 700;
            line-height: 1.25;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            color: #bdbdbd;
        }

        .category-card-header {
            flex: none;
            height: 26px;
            display: flex;
            align-items: flex-start;
            padding-right: 136px;
        }

        .category-ticker-tag {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 2;
            width: 132px;
            min-height: 26px;
            overflow: hidden;
            text-align: right;
            color-scheme: dark;
        }

        .category-ticker-tag tv-ticker-tag {
            max-width: 132px;
            color-scheme: dark;
        }

        .category-ticker-link {
            display: inline-flex;
            max-width: 132px;
            min-height: 26px;
            align-items: center;
            justify-content: flex-end;
            padding: 2px 4px;
            border: 1px solid transparent;
            border-radius: 6px;
            color: inherit;
            text-decoration: none;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.02);
            transition: background .18s ease, border-color .18s ease, filter .18s ease;
        }

        .category-ticker-link:hover,
        .category-ticker-link:focus-visible {
            border-color: rgba(142, 197, 255, 0.34);
            background: rgba(142, 197, 255, 0.08);
            filter: brightness(1.12);
            outline: none;
        }

        .category-chart {
            flex: 1;
            min-height: 0;
            overflow: hidden;
            border: 1px solid #242a33;
            border-radius: 6px;
            background: #0f0f0f;
            pointer-events: none;
            color-scheme: dark;
            --tv-widget-background-color: #0f0f0f;
            --tv-widget-text-color: #e0e0e0;
            --tv-widget-hover-background-color: #1b1f2a;
        }

        .category-chart.is-loading::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.07), transparent),
                linear-gradient(180deg, #111722 0%, #0c1017 100%);
            background-size: 220px 100%, 100% 100%;
            animation: chartSkeleton 1.25s ease-in-out infinite;
        }

        .category-chart {
            position: relative;
        }

        .category-chart.is-error::after {
            content: "No se pudo cargar el widget";
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 16px;
            color: #c7d0df;
            font-size: 0.84rem;
            text-align: center;
            background: #10141c;
        }

        @keyframes chartSkeleton {
            0% {
                background-position: -220px 0, 0 0;
            }

            100% {
                background-position: calc(100% + 220px) 0, 0 0;
            }
        }

        .category-chart .tradingview-widget-container,
        .category-chart .tradingview-widget-container__widget {
            width: 100%;
            height: 100%;
            display: block;
            opacity: 0;
            transition: opacity .28s ease;
        }

        .category-chart.is-ready .tradingview-widget-container,
        .category-chart.is-ready .tradingview-widget-container__widget {
            opacity: 1;
        }

        .watchlist-detail {
            flex: 1;
            min-height: 0;
            padding: 12px 12px 24px;
            background: #0f1115;
            overflow: auto;
        }

        .watchlist-detail>.tradingview-widget-container {
            min-width: 760px;
            width: 100%;
            height: 100%;
            border: 1px solid #272d37;
            border-radius: 8px;
            overflow: hidden;
            background: #11151b;
        }

        .watchlist-empty {
            flex: 1;
            display: grid;
            place-items: center;
            padding: 24px;
            background: #11151b;
            color: #aeb7c7;
            font-size: 0.95rem;
            border: 1px solid #272d37;
            border-radius: 8px;
            margin: 12px;
        }

        @media (min-width: 900px) {
            .category-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                grid-auto-rows: 360px;
            }
        }

        @media (min-width: 1600px) {
            .category-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
                grid-auto-rows: calc((100vh - 50px - 64px - 38px) / 2);
            }
        }

        @media (max-width: 1100px) {
            .watchlist-toolbar {
                min-height: 74px;
                grid-template-columns: 34px minmax(0, 1fr);
                padding: 8px 132px 8px 10px;
                gap: 7px;
                overflow: hidden;
            }

            .watchlist-subtitle {
                display: none;
            }

            .watchlist-view-toggle {
                position: absolute;
                top: 50%;
                right: 10px;
                transform: translateY(-50%);
                width: 112px;
            }

            .watchlist-view-button {
                min-width: 0;
                width: auto;
                font-size: 0.72rem;
            }
        }

        .is-compact-market-map .watchlist-toolbar {
            min-height: 74px;
            grid-template-columns: 34px minmax(0, 1fr);
            padding: 8px 132px 8px 10px;
            gap: 7px;
            overflow: hidden;
        }

        .is-compact-market-map .watchlist-subtitle {
            display: none;
        }

        .is-compact-market-map .watchlist-view-toggle {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            width: 112px;
        }

        .is-compact-market-map .watchlist-view-button {
            min-width: 0;
            width: auto;
            font-size: 0.72rem;
        }

        .is-compact-market-map .category-grid {
            grid-template-columns: 1fr;
            grid-auto-rows: 320px;
            padding-bottom: 34px;
        }

        .is-compact-market-map .watchlist-detail {
            overflow-x: auto;
        }

        @media (pointer: coarse) {
            #tab-contents {
                top: 64px !important;
                bottom: 0 !important;
            }

            .tabs {
                height: 64px !important;
                padding: 8px 10px;
            }

            .tabs button {
                height: 38px;
                min-width: 110px;
                font-size: 0.9rem;
            }

            .tabs button[data-tab="advanced-chart"],
            .tabs button[data-tab="stock-heatmap"],
            .tabs button[data-tab="etf-heatmap"],
            .tabs button[data-tab="crypto-heatmap"] {
                display: none !important;
            }

            .watchlist-toolbar {
                min-height: 74px;
                grid-template-columns: 34px minmax(0, 1fr) 112px;
                align-items: center;
                padding: 8px 10px;
                gap: 7px;
                overflow: hidden;
            }

            .watchlist-subtitle {
                display: none;
            }

            .watchlist-view-toggle {
                grid-column: auto;
                width: 112px;
            }

            .watchlist-view-button {
                flex: 1;
                min-width: 0;
                width: auto;
                height: 28px;
                padding: 0 6px;
                font-size: 0.72rem;
            }

            .category-grid {
                grid-template-columns: 1fr !important;
                grid-auto-rows: 300px !important;
                gap: 10px;
                padding: 10px 10px 34px;
            }

            .category-card {
                padding: 8px;
                gap: 7px;
            }

            .category-card-header {
                height: 24px;
                padding-right: 118px;
            }

            .category-card-title {
                font-size: 0.86rem;
            }

            .category-ticker-tag,
            .category-ticker-tag tv-ticker-tag,
            .category-ticker-link {
                max-width: 116px;
                width: 116px;
            }

            .watchlist-breadcrumb {
                font-size: 0.68rem;
            }

            .watchlist-breadcrumb-segment:not(.watchlist-breadcrumb-current) {
                max-width: 72px;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .watchlist-title {
                font-size: 0.92rem;
            }

            .watchlist-detail {
                padding: 10px 10px 34px;
                overflow-x: auto;
            }
        }

        @media (max-width: 899px) {
            .watchlist-toolbar {
                min-height: 74px;
                grid-template-columns: 34px minmax(0, 1fr);
                padding: 8px 132px 8px 10px;
                gap: 7px;
                overflow: hidden;
            }

            .watchlist-subtitle {
                display: none;
            }

            .watchlist-view-button {
                min-width: 0;
                width: auto;
                font-size: 0.72rem;
            }

            .watchlist-view-toggle {
                position: absolute;
                top: 50%;
                right: 10px;
                transform: translateY(-50%);
                width: 112px;
            }

            .category-grid {
                grid-template-columns: 1fr;
                grid-auto-rows: 320px;
                padding-bottom: 34px;
            }

            .watchlist-detail {
                overflow-x: auto;
            }
        }

        :root {
            --neo-page: #393a42;
            --neo-page-deep: #292a31;
            --neo-shell: rgba(12, 13, 18, 0.92);
            --neo-panel: rgba(16, 17, 23, 0.9);
            --neo-control: rgba(36, 38, 48, 0.78);
            --neo-control-hover: rgba(50, 53, 66, 0.86);
            --neo-border: rgba(255, 255, 255, 0.075);
            --neo-border-strong: rgba(255, 255, 255, 0.14);
            --neo-text: #f5f6fb;
            --neo-text-soft: #c9ccd7;
            --neo-muted: #7d8291;
            --neo-purple: #7477ff;
            --neo-cyan: #24d6c6;
            --neo-green: #19c792;
            --neo-red: #ff4b67;
            --neo-shadow: 0 26px 80px rgba(0, 0, 0, 0.46);
        }

        html,
        body {
            background:
                radial-gradient(circle at 50% -10%, rgba(126, 129, 255, 0.18), transparent 34%),
                radial-gradient(circle at 86% 22%, rgba(36, 214, 198, 0.08), transparent 28%),
                linear-gradient(145deg, var(--neo-page), var(--neo-page-deep));
            color: var(--neo-text-soft);
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Trebuchet MS", Roboto, Ubuntu, sans-serif;
            font-size: 13px;
            line-height: 1.38;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(120deg, rgba(255, 255, 255, 0.055), transparent 38%),
                radial-gradient(circle at 34% 72%, rgba(0, 0, 0, 0.2), transparent 34%);
        }

        * {
            scrollbar-color: rgba(255, 255, 255, 0.2) rgba(8, 9, 13, 0.8);
        }

        *::-webkit-scrollbar-track {
            background: rgba(8, 9, 13, 0.78);
        }

        *::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.22);
            border: 2px solid rgba(8, 9, 13, 0.78);
        }

        .tabs {
            height: 58px;
            gap: 8px;
            padding: 10px clamp(10px, 1.4vw, 20px);
            background: rgba(12, 13, 18, 0.78);
            border-bottom: 1px solid var(--neo-border);
            box-shadow: 0 16px 42px rgba(0, 0, 0, 0.22);
            backdrop-filter: blur(18px);
        }

        .tabs button {
            height: 36px;
            min-width: auto;
            padding: 0 14px;
            border: 1px solid transparent;
            border-radius: 9px;
            background: transparent;
            color: var(--neo-text-soft);
            font-size: 13px;
            font-weight: 650;
            letter-spacing: 0;
        }

        .tabs button:hover {
            border-color: var(--neo-border);
            background: var(--neo-control);
            color: var(--neo-text);
        }

        .tabs button.active {
            border-color: rgba(255, 255, 255, 0.16);
            background: linear-gradient(180deg, rgba(52, 55, 68, 0.94), rgba(29, 31, 40, 0.94));
            color: #ffffff;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.08),
                0 10px 26px rgba(0, 0, 0, 0.22);
        }

        #tab-contents {
            top: 58px;
            padding: clamp(12px, 2vw, 28px);
            background:
                radial-gradient(circle at 52% 8%, rgba(116, 119, 255, 0.18), transparent 34%),
                linear-gradient(145deg, rgba(57, 58, 66, 0.96), rgba(41, 42, 49, 0.98));
        }

        .tab-content,
        .watchlist-view,
        .watchlist-detail,
        .category-grid {
            background: transparent;
        }

        .watchlist-view {
            min-height: 100%;
            border: 1px solid var(--neo-border);
            border-radius: 22px;
            overflow: hidden;
            background: var(--neo-shell);
            box-shadow: var(--neo-shadow);
            backdrop-filter: blur(22px);
        }

        .watchlist-toolbar {
            min-height: 68px;
            grid-template-columns: auto minmax(0, 1fr) auto auto;
            gap: 10px 14px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--neo-border);
            background: linear-gradient(180deg, rgba(18, 19, 26, 0.96), rgba(13, 14, 20, 0.88));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(18px);
        }

        .watchlist-back {
            width: 38px;
            height: 38px;
            border: 1px solid var(--neo-border);
            border-radius: 11px;
            background: var(--neo-control);
            color: var(--neo-text);
            font-size: 24px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .watchlist-back:hover {
            border-color: var(--neo-border-strong);
            background: var(--neo-control-hover);
        }

        .watchlist-title {
            color: var(--neo-text);
            font-size: 18px;
            font-weight: 760;
            line-height: 1.12;
        }

        .watchlist-breadcrumb {
            gap: 6px;
            color: var(--neo-muted);
            font-size: 12px;
            font-weight: 620;
        }

        .watchlist-breadcrumb-segment:hover,
        .watchlist-breadcrumb-current {
            color: var(--neo-text-soft);
        }

        .watchlist-view-toggle {
            height: 38px;
            gap: 3px;
            padding: 3px;
            border: 1px solid var(--neo-border);
            border-radius: 12px;
            background: rgba(7, 8, 12, 0.72);
        }

        .watchlist-view-button {
            min-width: 86px;
            height: 30px;
            padding: 0 12px;
            border-radius: 9px;
            color: var(--neo-muted);

        .category-ticker-tag .tradingview-widget-container__widget,
        .category-ticker-tag iframe {
            background: transparent !important;
            background-color: transparent !important;
            width: 100% !important;
            height: 100% !important;
        }

        .category-ticker-tag .ticker-quote-widget,
        .category-ticker-tag .ticker-quote-widget * {
            background: #1b1b1b !important;
            background-color: #1b1b1b !important;
        }

        .category-ticker-tag .ticker-quote-widget {
            color-scheme: dark !important;
        }

        .category-ticker-tag .tradingview-widget-copyright {
            display: none !important;
        }

        .category-quote-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 10px;
            padding: 0;
        }

        .category-count-pill {
            min-height: 26px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            border: 1px solid var(--vscode-border);
            border-radius: 4px;
            background: var(--vscode-panel-2);
            color: var(--vscode-muted);
            font-size: 12px;
            font-weight: 650;
            white-space: nowrap;
        }

        .category-card>.category-ticker-tag {
            margin-top: 8px;
        }

        .category-chart,
        .watchlist-detail>.tradingview-widget-container {
            border-color: var(--vscode-border) !important;
            border-radius: 4px !important;
            background: #1b1b1b !important;
            box-shadow: none !important;
            --tv-widget-background-color: #1b1b1b;
            --tv-widget-text-color: #d4d4d4;
            --tv-widget-hover-background-color: #2d2d30;
        }

        .watchlist-empty {
            border-color: var(--vscode-border) !important;
            border-radius: 6px !important;
            background: var(--vscode-panel) !important;
            color: var(--vscode-muted) !important;
        }

        @media (max-width: 899px) {
            .tabs {
                width: var(--vscode-rail) !important;
                height: auto !important;
                padding: 8px 6px !important;
            }

            body.is-nav-expanded .tabs {
                width: 164px !important;
            }

            body.is-nav-expanded #tab-contents {
                left: 164px !important;
            }

            .tabs button[data-tab="advanced-chart"],
            .tabs button[data-tab="stock-heatmap"],
            .tabs button[data-tab="etf-heatmap"],
            .tabs button[data-tab="crypto-heatmap"] {
                display: none !important;
            }

            #tab-contents {
                top: 0 !important;
                left: var(--vscode-rail) !important;
                padding: 0 !important;
            }

            .watchlist-toolbar,
            .is-compact-market-map .watchlist-toolbar {
                min-height: 58px !important;
                grid-template-columns: 34px minmax(0, 1fr) auto !important;
                padding: 8px 10px !important;
            }

            .watchlist-view-button {
                width: 34px !important;
                min-width: 34px !important;
                padding: 0 !important;
                gap: 0 !important;
            }

            .watchlist-view-button-label {
                display: none !important;
            }

            .category-grid,
            .is-compact-market-map .category-grid {
                grid-template-columns: 1fr !important;
                grid-auto-rows: minmax(320px, 58vh) !important;
                gap: 10px !important;
                padding: 10px !important;
            }

            .category-card-header {
                min-height: 34px !important;
                height: auto !important;
                padding-right: 0 !important;
                padding-top: 0 !important;
            }

            .category-ticker-tag {
                width: auto !important;
                height: 86px !important;
            }

            .category-quote-row {
                grid-template-columns: 1fr;
                gap: 7px;
            }

            .category-count-pill {
                justify-self: start;
            }
        }
    </style>
</head>

<body>
    <script type="module" src="https://widgets.tradingview-widget.com/w/es/tv-ticker-tag.js"></script>

    <div class="tabs">
        <button class="tabs-menu-button" type="button" aria-label="Expandir menu" aria-expanded="false" title="Menu"></button>
        <button class="tab-button active" data-tab="watchlist" data-label="Market Map" title="Market Map">Market Map</button>
        <button class="tab-button" data-tab="advanced-chart" data-label="Advanced Chart" title="Advanced Chart">Advanced Chart</button>
        <button class="tab-button" data-tab="stock-heatmap" data-label="Stock Heatmap" title="Stock Heatmap">Stock Heatmap</button>
        <button class="tab-button" data-tab="etf-heatmap" data-label="ETF Heatmap" title="ETF Heatmap">ETF Heatmap</button>
        <button class="tab-button" data-tab="crypto-heatmap" data-label="Crypto Heatmap" title="Crypto Heatmap">Crypto Heatmap</button>
        <button class="tab-button" data-tab="usd-quotes" data-label="USD/ARS" title="USD/ARS">USD/ARS</button>
    </div>

    <div id="tab-contents">
        <div id="watchlist" class="tab-content active">
            <div id="watchlist-container" class="watchlist-view">
            </div>
        </div>

        <div id="advanced-chart" class="tab-content">
            <div id="advanced-chart-container" class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
            </div>
        </div>

        <div id="stock-heatmap" class="tab-content">
            <div id="stock-heatmap-container" class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
            </div>
        </div>

        <div id="etf-heatmap" class="tab-content">
            <div id="etf-heatmap-container" class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
            </div>
        </div>

        <div id="crypto-heatmap" class="tab-content">
            <div id="crypto-heatmap-container" class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
            </div>
        </div>

        <div id="usd-quotes" class="tab-content"></div>
    </div>

    <script>
        let APP_DATA = null;
        const initializedTabs = new Set();
        let WATCHLIST_STACK = [];
        const MARKET_MAP_VIEW_BY_NODE = {};
        const MARKET_MAP_WIDGET_OBSERVER = 'IntersectionObserver' in window
            ? new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (!entry.isIntersecting) return;
                    MARKET_MAP_WIDGET_OBSERVER.unobserve(entry.target);
                    mountDeferredTradingViewWidget(entry.target);
                });
            }, {
                root: null,
                rootMargin: '650px 0px',
                threshold: 0.01
            })
            : null;

        function syncMarketMapCompactMode() {
            const effectiveWidth = Math.min(
                window.innerWidth || Infinity,
                window.visualViewport?.width || Infinity
            );
            document.documentElement.classList.toggle('is-compact-market-map', effectiveWidth < 900);
        }

        syncMarketMapCompactMode();
        window.addEventListener('resize', syncMarketMapCompactMode);

        function initSymbols() {
            fetch('symbols.json')
                .then(res => res.json())
                .then(data => {
                    APP_DATA = data;

                    validateWatchlistGraph();
                    initWatchlist();

                    initializedTabs.add('watchlist');
                })
                .catch(console.error);
        }

        function ensureTabInitialized(tab) {
            if (initializedTabs.has(tab)) return;

            switch (tab) {
                case 'advanced-chart':
                    if (!APP_DATA) return;
                    initAdvancedChart(APP_DATA);
                    break;

                case 'stock-heatmap':
                    initStockHeatmap();
                    break;

                case 'etf-heatmap':
                    initEtfHeatmap();
                    break;

                case 'crypto-heatmap':
                    initCryptoHeatmap();
                    break;

                case 'usd-quotes':
                    initUsdQuotesTab();
                    break;
            }

            initializedTabs.add(tab);
        }

        function isIndexOrEtf(symbol) {
            const displayName = symbol.displayName || '';
            const normalized = displayName
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '');

            return /\bETF\b/.test(displayName) || normalized.includes('indice');
        }

        function getSymbol(id) {
            const symbol = APP_DATA?.symbols?.[id];
            if (!symbol) {
                console.warn(`Símbolo no encontrado en catálogo: ${id}`);
            }
            return symbol || null;
        }

        function getNode(id) {
            const node = APP_DATA?.nodes?.[id];
            if (!node) {
                console.warn(`Nodo no encontrado en catálogo: ${id}`);
            }
            return node || null;
        }

        function sortNodesByName(nodeIds = []) {
            return [...new Set(nodeIds)]
                .filter(id => APP_DATA?.nodes?.[id]);
        }

        function sortSymbolsByShortName(symbolIds = []) {
            return [...new Set(symbolIds)]
                .filter(id => APP_DATA?.symbols?.[id])
                .sort((a, b) => {
                    const symbolA = APP_DATA.symbols[a];
                    const symbolB = APP_DATA.symbols[b];
                    return (symbolA.shortName || symbolA.name).localeCompare(symbolB.shortName || symbolB.name, 'es');
                });
        }

        function getNodeChildren(node) {
            return sortNodesByName(node?.childNodeIds || [])
                .map(getNode)
                .filter(Boolean);
        }

        function getNodeSymbols(node) {
            return sortSymbolsByShortName(node?.symbolIds || [])
                .map(getSymbol)
                .filter(Boolean);
        }

        function getRepresentativeSymbol(node) {
            if (!node) return null;

            if (node.representativeSymbolId) {
                const configured = getSymbol(node.representativeSymbolId);
                if (configured) return configured;
            }

            return getNodeSymbols(node)[0] || null;
        }

        function validateWatchlistGraph() {
            if (!APP_DATA) return;

            Object.values(APP_DATA.nodes || {}).forEach(node => {
                if (node.representativeSymbolId && !APP_DATA.symbols?.[node.representativeSymbolId]) {
                    console.warn(`Nodo ${node.id}: representativeSymbolId inexistente: ${node.representativeSymbolId}`);
                }

                (node.secondaryRepresentativeSymbolIds || []).forEach(symbolId => {
                    if (!APP_DATA.symbols?.[symbolId]) {
                        console.warn(`Nodo ${node.id}: secondaryRepresentativeSymbolId inexistente: ${symbolId}`);
                    }
                });

                (node.symbolIds || []).forEach(symbolId => {
                    if (!APP_DATA.symbols?.[symbolId]) {
                        console.warn(`Nodo ${node.id}: symbolId inexistente: ${symbolId}`);
                    }
                });

                (node.childNodeIds || []).forEach(childNodeId => {
                    if (!APP_DATA.nodes?.[childNodeId]) {
                        console.warn(`Nodo ${node.id}: childNodeId inexistente: ${childNodeId}`);
                    }
                });
            });
        }

        function createDeferredTradingViewWidget(scriptSrc, cfg) {
            const container = document.createElement('div');
            container.className = 'tradingview-widget-container';

            const widget = document.createElement('div');
            widget.className = 'tradingview-widget-container__widget';
            container.appendChild(widget);
            container.dataset.widgetSrc = scriptSrc;
            container.dataset.widgetConfig = JSON.stringify(cfg);

            if (MARKET_MAP_WIDGET_OBSERVER) {
                MARKET_MAP_WIDGET_OBSERVER.observe(container);
            } else {
                window.requestAnimationFrame(() => mountDeferredTradingViewWidget(container));
            }

            return container;
        }

        function mountDeferredTradingViewWidget(container) {
            if (!container || container.dataset.widgetMounted === 'true') return;

            container.dataset.widgetMounted = 'true';
            const chart = container.closest('.category-chart');
            chart?.classList.add('is-loading');

            const script = document.createElement('script');
            script.type = 'text/javascript';
            script.async = true;
            script.src = container.dataset.widgetSrc;
            script.innerHTML = container.dataset.widgetConfig;
            script.addEventListener('load', () => {
                window.setTimeout(() => {
                    chart?.classList.remove('is-loading');
                    chart?.classList.add('is-ready');
                }, 420);
            });
            script.addEventListener('error', () => {
                chart?.classList.remove('is-loading');
                chart?.classList.add('is-error');
            });

            container.appendChild(script);
        }

        function createSymbolOverview(symbolName, title) {
            return createDeferredTradingViewWidget(
                'https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js',
                {
                lineWidth: 2,
                lineType: 0,
                chartType: "candlesticks",
                showVolume: true,
                fontColor: "#9598a1",
                gridLineColor: "rgba(42, 46, 57, 0.72)",
                volumeUpColor: "rgba(8, 153, 129, 0.42)",
                volumeDownColor: "rgba(242, 54, 69, 0.42)",
                backgroundColor: "#0d0f14",
                widgetFontColor: "#d1d4dc",
                upColor: "#089981",
                downColor: "#f23645",
                borderUpColor: "#089981",
                borderDownColor: "#f23645",
                wickUpColor: "#089981",
                wickDownColor: "#f23645",
                colorTheme: "dark",
                isTransparent: false,
                locale: "es",
                chartOnly: true,
                scalePosition: "right",
                scaleMode: "Normal",
                fontFamily: "-apple-system, BlinkMacSystemFont, Trebuchet MS, Roboto, Ubuntu, sans-serif",
                valuesTracking: "1",
                changeMode: "price-and-percent",
                symbols: [
                    [
                        title,
                        `${symbolName}|3M`
                    ]
                ],
                dateRanges: [
                    "3m|1D"
                ],
                fontSize: "10",
                headerFontSize: "medium",
                autosize: true,
                dateFormat: "qq 'yy",
                width: "100%",
                height: "100%",
                noTimeScale: false,
                hideDateRanges: false,
                showMA: true,
                maLength: "20",
                maLineColor: "rgba(255, 183, 77, 0.72)",
                maLineWidth: 1
                }
            );
        }

        function createTickerTag(symbolName) {
            const tag = document.createElement('tv-ticker-tag');
            tag.setAttribute('symbol', symbolName);
            tag.setAttribute('hide-background', '');
            tag.setAttribute('size', 'medium');
            tag.textContent = symbolName;
            tag.style.display = 'inline-block';
            tag.style.colorScheme = 'dark';
            return tag;
        }

        function createTickerLink(symbolName) {
            const link = document.createElement('a');
            link.className = 'category-ticker-link';
            link.href = `https://www.tradingview.com/chart/?symbol=${encodeURIComponent(symbolName)}`;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.title = 'Abrir en TradingView';
            link.setAttribute('aria-label', `Abrir ${symbolName} en TradingView`);
            link.appendChild(createTickerTag(symbolName));
            link.addEventListener('click', event => {
                event.preventDefault();
                event.stopPropagation();
                window.open(link.href, '_blank', 'noopener,noreferrer');
            });
            link.addEventListener('keydown', event => {
                event.stopPropagation();
            });
            return link;
        }

        function createTickerQuoteWidget(symbolName, title) {
            const container = document.createElement('div');
            container.className = 'tradingview-widget-container ticker-quote-widget';
            container.style.background = '#1b1b1b';
            container.style.backgroundColor = '#1b1b1b';
            container.style.colorScheme = 'dark';

            const widget = document.createElement('div');
            widget.className = 'tradingview-widget-container__widget';
            widget.style.background = '#1b1b1b';
            widget.style.backgroundColor = '#1b1b1b';
            container.appendChild(widget);

            const copyright = document.createElement('div');
            copyright.className = 'tradingview-widget-copyright';
            copyright.innerHTML = '<a href="https://www.tradingview.com/markets/" rel="noopener nofollow" target="_blank"><span class="blue-text">Markets today</span></a><span class="trademark"> by TradingView</span>';
            container.appendChild(copyright);

            const script = document.createElement('script');
            script.type = 'text/javascript';
            script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-tickers.js';
            script.async = true;
            script.text = JSON.stringify({
                symbols: [
                    {
                        proName: symbolName,
                        title: title || symbolName
                    }
                ],
                colorTheme: "dark",
                locale: "en",
                largeChartUrl: "",
                isTransparent: false,
                showSymbolLogo: true
            }, null, 2);
            container.appendChild(script);

            return container;
        }

        function mountMarketQuotes(container, symbolsGroups) {
            const cfg = {
                colorTheme: "dark",
                dateRange: "3M",
                locale: "en",
                largeChartUrl: "",
                isTransparent: true,
                showFloatingTooltip: true,
                plotLineColorGrowing: "rgba(76, 175, 80, 1)",
                plotLineColorFalling: "rgba(242, 54, 69, 1)",
                gridLineColor: "rgba(240, 243, 250, 0)",
                scaleFontColor: "#DBDBDB",
                belowLineFillColorGrowing: "rgba(76, 175, 80, 0.12)",
                belowLineFillColorFalling: "rgba(242, 54, 69, 0.12)",
                belowLineFillColorGrowingBottom: "rgba(76, 175, 80, 0)",
                belowLineFillColorFallingBottom: "rgba(242, 54, 69, 0)",
                symbolActiveColor: "rgba(255, 255, 255, 0.12)",
                tabs: symbolsGroups.map(group => ({
                    title: group.name,
                    symbols: (group.symbols || []).map(symbol => ({
                        s: symbol.name,
                        d: symbol.displayName || symbol.shortName || symbol.name
                    })),
                    originalTitle: group.name
                })),
                support_host: "https://www.tradingview.com",
                width: "100%",
                height: "100%",
                showSymbolLogo: true,
                showChart: false
            };

            container.innerHTML = '';
            const widgetContainer = document.createElement('div');
            widgetContainer.className = 'tradingview-widget-container';
            widgetContainer.innerHTML = '<div class="tradingview-widget-container__widget"></div>';

            const s = document.createElement('script');
            s.src = 'https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js';
            s.async = true;
            s.innerHTML = JSON.stringify(cfg, null, 2);
            widgetContainer.appendChild(s);
            container.appendChild(widgetContainer);
        }

        function initWatchlist() {
            const rootNodeId = APP_DATA?.watchlistRootNodeId;
            WATCHLIST_STACK = rootNodeId ? [rootNodeId] : [];
            renderWatchlistNode();
        }

        function navigateToNode(nodeId) {
            if (!getNode(nodeId)) return;

            const existingIndex = WATCHLIST_STACK.indexOf(nodeId);
            WATCHLIST_STACK = existingIndex >= 0
                ? WATCHLIST_STACK.slice(0, existingIndex + 1)
                : [...WATCHLIST_STACK, nodeId];

            renderWatchlistNode();
        }

        function goBack() {
            if (WATCHLIST_STACK.length <= 1) return;
            WATCHLIST_STACK = WATCHLIST_STACK.slice(0, -1);
            renderWatchlistNode();
        }

        function navigateToStackIndex(index) {
            if (index < 0 || index >= WATCHLIST_STACK.length) return;
            WATCHLIST_STACK = WATCHLIST_STACK.slice(0, index + 1);
            renderWatchlistNode();
        }

        function buildBreadcrumbFromNavigationStack() {
            return WATCHLIST_STACK
                .map((id, index) => ({ id, index, node: getNode(id) }))
                .filter(item => item.node);
        }

        function getDefaultMarketMapView(node) {
            return (node?.childNodeIds || []).length ? 'chart' : 'list';
        }

        function getActiveMarketMapView(node) {
            return MARKET_MAP_VIEW_BY_NODE[node.id] || getDefaultMarketMapView(node);
        }

        function setMarketMapView(nodeId, view) {
            MARKET_MAP_VIEW_BY_NODE[nodeId] = view;
            renderWatchlistNode();
        }

        function createWatchlistToolbar(node, itemCount, itemType, activeView) {
            const container = document.getElementById('watchlist-container');
            const toolbar = document.createElement('div');
            toolbar.className = 'watchlist-toolbar';

            const back = document.createElement('button');
            back.className = 'watchlist-back';
            back.type = 'button';
            back.textContent = '\u2039';
            back.title = 'Volver';
            back.disabled = WATCHLIST_STACK.length <= 1;
            back.addEventListener('click', goBack);

            const heading = document.createElement('div');
            heading.className = 'watchlist-heading';

            const breadcrumb = document.createElement('div');
            breadcrumb.className = 'watchlist-breadcrumb';

            buildBreadcrumbFromNavigationStack().forEach((item, index, items) => {
                if (index > 0) {
                    const separator = document.createElement('span');
                    separator.textContent = '>';
                    breadcrumb.appendChild(separator);
                }

                const segment = document.createElement('button');
                segment.type = 'button';
                segment.className = index === items.length - 1
                    ? 'watchlist-breadcrumb-segment watchlist-breadcrumb-current'
                    : 'watchlist-breadcrumb-segment';
                segment.textContent = item.node.name;
                segment.disabled = index === items.length - 1;
                segment.addEventListener('click', () => navigateToStackIndex(item.index));
                breadcrumb.appendChild(segment);
            });

            const title = document.createElement('div');
            title.className = 'watchlist-title';
            title.textContent = node.name;

            heading.appendChild(breadcrumb);
            heading.appendChild(title);

            const viewToggle = document.createElement('div');
            viewToggle.className = 'watchlist-view-toggle';

            [
                ['chart', 'Gr\u00e1fico'],
                ['list', 'Lista']
            ].forEach(([view, label]) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = `watchlist-view-button${activeView === view ? ' active' : ''}`;
                button.dataset.view = view;
                button.setAttribute('aria-label', label);

                const labelText = document.createElement('span');
                labelText.className = 'watchlist-view-button-label';
                labelText.textContent = label;
                button.appendChild(labelText);

                button.addEventListener('click', () => setMarketMapView(node.id, view));
                viewToggle.appendChild(button);
            });

            const subtitle = document.createElement('div');
            subtitle.className = 'watchlist-subtitle';
            subtitle.textContent = itemType === 'node'
                ? `${itemCount} sectores`
                : `${itemCount} s\u00edmbolos`;

            toolbar.appendChild(back);
            toolbar.appendChild(heading);
            toolbar.appendChild(viewToggle);
            toolbar.appendChild(subtitle);
            container.appendChild(toolbar);
        }

        function createNodeCard(node) {
            const representative = getRepresentativeSymbol(node);
            const card = document.createElement('div');
            card.className = 'category-card is-navigable';
            card.tabIndex = 0;
            card.setAttribute('role', 'button');
            card.addEventListener('click', event => {
                if (event.defaultPrevented || event.target.closest('.category-ticker-tag')) return;
                navigateToNode(node.id);
            });
            card.addEventListener('keydown', event => {
                if (event.target.closest('.category-ticker-tag')) return;
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    navigateToNode(node.id);
                }
            });

            const header = document.createElement('div');
            header.className = 'category-card-header';

            const heading = document.createElement('div');
            heading.className = 'category-card-heading';

            const cardTitle = document.createElement('div');
            cardTitle.className = 'category-card-title';
            cardTitle.textContent = node.name;

            const childCount = (node.childNodeIds || []).length;
            const symbolCount = (node.symbolIds || []).length;
            const meta = document.createElement('div');
            meta.className = 'category-card-meta';
            meta.textContent = childCount
                ? `${childCount} sectores`
                : `${symbolCount} simbolos`;

            heading.appendChild(cardTitle);
            header.appendChild(heading);

            let quoteRow = null;

            if (representative) {
                quoteRow = document.createElement('div');
                quoteRow.className = 'category-quote-row';

                const tagHost = document.createElement('div');
                tagHost.className = 'category-ticker-tag';
                tagHost.appendChild(createTickerQuoteWidget(representative.name, representative.shortName || node.name));

                const count = document.createElement('div');
                count.className = 'category-count-pill';
                count.textContent = meta.textContent;

                quoteRow.appendChild(tagHost);
                quoteRow.appendChild(count);
            }

            card.appendChild(header);
            if (quoteRow) {
                card.appendChild(quoteRow);
            }

            if (representative) {
                const chart = document.createElement('div');
                chart.className = 'category-chart is-loading';
                chart.appendChild(createSymbolOverview(representative.name, node.name));
                card.appendChild(chart);
            }

            return card;
        }

        function createSymbolGraphCard(symbol) {
            const card = document.createElement('div');
            card.className = 'category-card';

            const header = document.createElement('div');
            header.className = 'category-card-header';

            const heading = document.createElement('div');
            heading.className = 'category-card-heading';

            const cardTitle = document.createElement('div');
            cardTitle.className = 'category-card-title';
            cardTitle.textContent = symbol.shortName || symbol.name;
            cardTitle.title = symbol.displayName || symbol.name;

            const meta = document.createElement('div');
            meta.className = 'category-card-meta';
            meta.textContent = symbol.displayName || symbol.name;

            heading.appendChild(cardTitle);
            header.appendChild(heading);

            const quoteRow = document.createElement('div');
            quoteRow.className = 'category-quote-row';

            const tagHost = document.createElement('div');
            tagHost.className = 'category-ticker-tag';
            tagHost.appendChild(createTickerQuoteWidget(symbol.name, symbol.shortName || symbol.name));
            const count = document.createElement('div');
            count.className = 'category-count-pill';
            count.textContent = symbol.type || 'simbolo';

            quoteRow.appendChild(tagHost);
            quoteRow.appendChild(count);
            card.appendChild(header);
            card.appendChild(quoteRow);

            const chart = document.createElement('div');
            chart.className = 'category-chart is-loading';
            chart.appendChild(createSymbolOverview(symbol.name, symbol.shortName || symbol.name));
            card.appendChild(chart);

            return card;
        }

        function getChildNodeListSymbols(children) {
            return children
                .map(childNode => {
                    const representative = getRepresentativeSymbol(childNode);
                    if (!representative) return null;

                    return {
                        name: representative.name,
                        displayName: childNode.name,
                        shortName: representative.shortName || representative.name
                    };
                })
                .filter(Boolean);
        }

        function renderWatchlistNode() {
            const container = document.getElementById('watchlist-container');
            container.innerHTML = '';

            const currentNode = getNode(WATCHLIST_STACK[WATCHLIST_STACK.length - 1]);
            if (!currentNode) {
                container.innerHTML = '<div class="watchlist-empty">Sin s\u00edmbolos configurados</div>';
                return;
            }

            const children = getNodeChildren(currentNode);
            const symbols = getNodeSymbols(currentNode);
            const activeView = getActiveMarketMapView(currentNode);
            const hasChildren = children.length > 0;
            const items = hasChildren ? children : symbols;
            const itemType = hasChildren ? 'node' : 'symbol';

            createWatchlistToolbar(currentNode, items.length, itemType, activeView);

            if (!items.length) {
                const empty = document.createElement('div');
                empty.className = 'watchlist-empty';
                empty.textContent = 'Sin s\u00edmbolos configurados';
                container.appendChild(empty);
                return;
            }

            if (activeView === 'chart') {
                const grid = document.createElement('div');
                grid.className = 'category-grid';

                if (hasChildren) {
                    children.forEach(childNode => grid.appendChild(createNodeCard(childNode)));
                } else {
                    symbols.forEach(symbol => grid.appendChild(createSymbolGraphCard(symbol)));
                }

                container.appendChild(grid);
                return;
            }

            const detail = document.createElement('div');
            detail.className = 'watchlist-detail';
            container.appendChild(detail);

            const listSymbols = hasChildren
                ? getChildNodeListSymbols(children)
                : symbols.map(symbol => ({
                    name: symbol.name,
                    displayName: symbol.displayName,
                    shortName: symbol.shortName
                }));

            if (!listSymbols.length) {
                detail.innerHTML = '<div class="watchlist-empty">Sin s\u00edmbolos configurados</div>';
                return;
            }

            mountMarketQuotes(detail, [{
                name: currentNode.name,
                symbols: listSymbols
            }]);
        }

        async function initUsdQuotesTab() {
            const container = document.getElementById('usd-quotes');
            if (container.dataset.loaded) return;

            try {
                const res = await fetch('usd-quotes-widget.html', { cache: 'no-store' });
                const html = await res.text();

                const tmp = document.createElement('div');
                tmp.innerHTML = html;

                container.innerHTML = '';
                Array.from(tmp.childNodes).forEach(n => container.appendChild(n));

                const scripts = container.querySelectorAll('script');
                scripts.forEach(old => {
                    const s = document.createElement('script');

                    if (old.src) {
                        s.src = old.src;
                        s.async = old.async;
                    } else {
                        s.textContent = old.textContent;
                    }

                    old.replaceWith(s);
                });

                container.dataset.loaded = 'true';
            } catch (err) {
                container.innerHTML = "<p style='padding:20px;color:#aaa;'>Error al cargar el widget del dólar.</p>";
            }
        }

        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
                document.getElementById(tab).classList.add('active');

                ensureTabInitialized(tab);
            });
        });

        window.addEventListener('DOMContentLoaded', () => {
            initSymbols();

            const tabs = document.querySelector('.tabs');
            const menuButton = document.querySelector('.tabs-menu-button');
            let isDown = false;
            let startX = 0;
            let scrollLeft = 0;

            menuButton?.addEventListener('click', () => {
                const expanded = document.body.classList.toggle('is-nav-expanded');
                menuButton.setAttribute('aria-expanded', String(expanded));
                menuButton.setAttribute('aria-label', expanded ? 'Contraer menu' : 'Expandir menu');
                menuButton.title = expanded ? 'Contraer menu' : 'Menu';
            });

            tabs.addEventListener('mousedown', (e) => {
                if (e.target.closest('button')) return;
                if (e.button !== 0) return;
                isDown = true;
                startX = e.pageX - tabs.offsetLeft;
                scrollLeft = tabs.scrollLeft;
            });

            window.addEventListener('mouseup', () => {
                isDown = false;
            });

            tabs.addEventListener('mouseleave', () => {
                isDown = false;
            });

            tabs.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - tabs.offsetLeft;
                const walk = x - startX;
                tabs.scrollLeft = scrollLeft - walk;
            });

            tabs.addEventListener('wheel', (e) => {
                if (!e.deltaY && !e.deltaX) return;
                e.preventDefault();
                tabs.scrollLeft += (Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY);
            }, { passive: false });

            if ('serviceWorker' in navigator) {
                fetch('sw.js', { method: 'HEAD' })
                    .then(res => {
                        if (res.ok) {
                            navigator.serviceWorker.register('sw.js', { scope: './' });
                        }
                    })
                    .catch(() => { });
            }
        });
