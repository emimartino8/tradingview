<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
    <meta name="theme-color" content="#121212">
    <meta name="mobile-web-app-capable" content="yes">
    <meta charset="UTF-8">
    <title>My Trading View</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #121212;
            color: #e0e0e0;
            font-family: sans-serif;
        }

        #ticker-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px !important;
            max-height: 60px !important;
            z-index: 1001;
            background: #1f1f1f;
            overflow: hidden !important;
        }

        #ticker-container iframe {
            display: block;
        }

        .tabs {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            display: flex;
            background: #1f1f1f;
            border-bottom: 1px solid #333;
            z-index: 1000;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            cursor: grab;
            user-select: none;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tabs:active {
            cursor: grabbing;
        }

        .tabs button {
            flex: none;
            width: 150px;
            border: none;
            background: none;
            cursor: pointer;
            color: #bbb;
            font-size: 1rem;
            transition: background .2s, color .2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 0 0 auto;
        }

        .tabs button:hover {
            background: #2a2a2a;
        }

        .tabs button.active {
            border-bottom: 3px solid #2979ff;
            color: #fff;
            background: #121212;
            font-weight: bold;
        }

        #tab-contents {
            position: absolute;
            top: 50px;
            bottom: 60px;
            left: 0;
            right: 0;
            overflow: hidden;
        }

        .tab-content {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .tradingview-widget-container {
            width: 100%;
            height: 100%;
        }

        .tradingview-widget-container__widget {
            width: 100%;
            height: 100%;
        }

        .grid-scroll {
            background: #2a2a2a;
            position: absolute;
            inset: 0;
            overflow: auto;
            padding: 12px;
        }

        .grid-scroll {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            grid-auto-rows: 450px;
            gap: 10px;
        }

        .symbol-card {
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .symbol-card .tradingview-widget-container,
        .symbol-card .tradingview-widget-container__widget {
            width: 100%;
            height: 100%;
        }

        .symbol-card {
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
            border: 1px solid #333;
            border-radius: 8px;
            background: #121212;
        }

        .symbol-quote-bar {
            flex: none;
            height: 90px;
            display: flex;
            align-items: stretch;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
        }

        .symbol-quote-bar .tradingview-widget-container,
        .symbol-quote-bar .tradingview-widget-container__widget {
            width: 100%;
            height: 100%;
        }

        .symbol-chart-area {
            height: 360px;
            flex: none;
            position: relative;
            overflow: hidden;
        }

        .symbol-chart-area .tradingview-widget-container,
        .symbol-chart-area .tradingview-widget-container__widget {
            width: 100%;
            height: 100%;
        }

        .tradingview-widget-copyright {
            display: none !important;
        }

        .watchlist-view {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            background: #121212;
            overflow: hidden;
        }

        .watchlist-toolbar {
            flex: none;
            min-height: 52px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-bottom: 1px solid #333;
            background: #1a1a1a;
        }

        .watchlist-title {
            min-width: 0;
            flex: 1;
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .watchlist-subtitle {
            font-size: 0.8rem;
            color: #9f9f9f;
            white-space: nowrap;
        }

        .watchlist-back {
            flex: none;
            width: 36px;
            height: 36px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #222;
            color: #eee;
            cursor: pointer;
            font-size: 1.2rem;
            line-height: 1;
        }

        .watchlist-back:hover {
            background: #2d2d2d;
        }

        .category-grid {
            flex: 1;
            overflow: auto;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            align-content: start;
            gap: 10px;
            padding: 12px;
            background: #202020;
        }

        .category-card {
            position: relative;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 12px;
            border: 1px solid #333;
            background: #121212;
            color: #e8e8e8;
            cursor: pointer;
            text-align: left;
            font: inherit;
        }

        .category-card:hover {
            border-color: #4b6ea9;
            background: #171b22;
        }

        .category-card-title {
            flex: none;
            height: 20px;
            min-width: 0;
            font-size: 1rem;
            font-weight: 700;
            line-height: 1.25;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            color: #bdbdbd;
        }

        .category-card-header {
            flex: none;
            height: 25px;
            display: flex;
            align-items: flex-start;
            padding-right: 145px;
        }

        .category-ticker-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 2;
            width: 140px;
            min-height: 28px;
            overflow: hidden;
            pointer-events: none;
            text-align: right;
            color-scheme: dark;
        }

        .category-ticker-tag tv-ticker-tag {
            max-width: 140px;
            color-scheme: dark;
        }

        .category-chart {
            flex: 1;
            min-height: 0;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            background: #0f0f0f;
            pointer-events: none;
            color-scheme: dark;
            --tv-widget-background-color: #0f0f0f;
            --tv-widget-text-color: #e0e0e0;
            --tv-widget-hover-background-color: #1b1f2a;
        }

        .category-chart .tradingview-widget-container,
        .category-chart .tradingview-widget-container__widget {
            width: 100%;
            height: 100%;
            display: block;
        }

        .watchlist-detail {
            flex: 1;
            min-height: 0;
        }

        @media (pointer: coarse) {
            #ticker-container {
                display: none !important;
            }

            #tab-contents {
                top: 90px !important;
                bottom: 0 !important;
            }

            .tabs {
                height: 90px !important;
            }

            .tabs button {
                height: 90px;
                width: 180px;
                font-size: 1.25rem;
            }

            .tabs button[data-tab="advanced-chart"],
            .tabs button[data-tab="stock-heatmap"],
            .tabs button[data-tab="etf-heatmap"],
            .tabs button[data-tab="crypto-heatmap"] {
                display: none !important;
            }

            .grid-scroll {
                grid-template-columns: 1fr !important;
                grid-auto-rows: 600px !important;
            }

            .symbol-card {
                width: 100%;
                height: auto;
            }

            .symbol-chart-area {
                height: 510px;
            }

            .watchlist-toolbar {
                min-height: 64px;
            }

            .watchlist-subtitle {
                display: none;
            }

            .category-grid {
                grid-template-columns: 1fr !important;
            }
        }

        @media (max-width: 1200px) and (pointer: fine) {
            .category-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 760px) and (pointer: fine) {
            .category-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <script type="module" src="https://widgets.tradingview-widget.com/w/es/tv-ticker-tag.js"></script>

    <div id="ticker-container" class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
    </div>

    <div class="tabs">
        <button class="tab-button active" data-tab="watchlist">Watchlist</button>
        <button class="tab-button" data-tab="advanced-chart">Advanced Chart</button>
        <button class="tab-button" data-tab="etf-chart-grid">ETF Charts</button>
        <button class="tab-button" data-tab="crypto-chart-grid">Crypto Charts</button>
        <button class="tab-button" data-tab="stock-heatmap">Stock Heatmap</button>
        <button class="tab-button" data-tab="etf-heatmap">ETF Heatmap</button>
        <button class="tab-button" data-tab="crypto-heatmap">Crypto Heatmap</button>
        <button class="tab-button" data-tab="usd-quotes">USD/ARS</button>
    </div>

    <div id="tab-contents">
        <div id="watchlist" class="tab-content active">
            <div id="watchlist-container" class="watchlist-view">
            </div>
        </div>

        <div id="advanced-chart" class="tab-content">
            <div id="advanced-chart-container" class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
            </div>
        </div>

        <div id="etf-chart-grid" class="tab-content">
            <div id="etf-chart-grid-scroll" class="grid-scroll">
            </div>
        </div>

        <div id="crypto-chart-grid" class="tab-content">
            <div id="crypto-chart-grid-scroll" class="grid-scroll">
            </div>
        </div>

        <div id="stock-heatmap" class="tab-content">
            <div id="stock-heatmap-container" class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
            </div>
        </div>

        <div id="etf-heatmap" class="tab-content">
            <div id="etf-heatmap-container" class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
            </div>
        </div>

        <div id="crypto-heatmap" class="tab-content">
            <div id="crypto-heatmap-container" class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
            </div>
        </div>

        <div id="usd-quotes" class="tab-content"></div>
    </div>

    <script>
        let APP_DATA = null;
        const initializedTabs = new Set();

        let CARD_OBSERVER = null;

        function ensureCardObserver() {
            if (CARD_OBSERVER) return;

            CARD_OBSERVER = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (!entry.isIntersecting) return;

                    const card = entry.target;
                    CARD_OBSERVER.unobserve(card);

                    initCardWidgets(card);
                });
            }, {
                root: null,
                rootMargin: '300px 0px',
                threshold: 0.01
            });
        }

        function observeCard(card) {
            ensureCardObserver();
            CARD_OBSERVER.observe(card);
        }

        function initCardWidgets(card) {
            const symbol = card.dataset.symbol;
            const interval = card.dataset.interval || "5";

            const quoteContainer = card.querySelector('[data-role="quote"]');
            const chartContainer = card.querySelector('[data-role="chart"]');

            if (quoteContainer && !quoteContainer.dataset.loaded) {
                const quoteCfg = {
                    symbol: symbol,
                    colorTheme: "dark",
                    isTransparent: true,
                    locale: "es",
                    width: "100%"
                };

                const quoteScript = document.createElement('script');
                quoteScript.src = 'https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js';
                quoteScript.async = true;
                quoteScript.type = 'text/javascript';
                quoteScript.innerHTML = JSON.stringify(quoteCfg, null, 2);
                quoteContainer.appendChild(quoteScript);
                quoteContainer.dataset.loaded = 'true';
            }

            if (chartContainer && !chartContainer.dataset.loaded) {
                const chartCfg = {
                    allow_symbol_change: false,
                    calendar: false,
                    details: false,
                    hide_side_toolbar: true,
                    hide_top_toolbar: true,
                    hide_legend: true,
                    hide_volume: true,
                    hotlist: false,
                    interval: interval,
                    locale: "es",
                    save_image: false,
                    style: "1",
                    symbol: symbol,
                    theme: "dark",
                    timezone: "America/Argentina/Buenos_Aires",
                    backgroundColor: "#0F0F0F",
                    gridColor: "rgba(242, 242, 242, 0.06)",
                    watchlist: [],
                    withdateranges: false,
                    compareSymbols: [],
                    studies: [],
                    autosize: true
                };

                const chartScript = document.createElement('script');
                chartScript.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
                chartScript.async = true;
                chartScript.type = 'text/javascript';
                chartScript.innerHTML = JSON.stringify(chartCfg, null, 2);
                chartContainer.appendChild(chartScript);
                chartContainer.dataset.loaded = 'true';
            }
        }

        function initSymbols() {
            fetch('symbols.json')
                .then(res => res.json())
                .then(data => {
                    APP_DATA = data;

                    initTickerTape(data.indexSymbols);
                    initWatchlistSummary(data.symbolsGroups);

                    initializedTabs.add('watchlist');
                })
                .catch(console.error);
        }

        function ensureTabInitialized(tab) {
            if (initializedTabs.has(tab)) return;

            switch (tab) {
                case 'advanced-chart':
                    if (!APP_DATA) return;
                    initAdvancedChart(APP_DATA.symbolsGroups);
                    break;

                case 'etf-chart-grid':
                    if (!APP_DATA) return;
                    initEtfChartGrid(APP_DATA.indexSymbols);
                    break;

                case 'crypto-chart-grid':
                    if (!APP_DATA) return;
                    initCryptoChartGrid(APP_DATA.cryptoSymbols);
                    break;

                case 'stock-heatmap':
                    initStockHeatmap();
                    break;

                case 'etf-heatmap':
                    initEtfHeatmap();
                    break;

                case 'crypto-heatmap':
                    initCryptoHeatmap();
                    break;

                case 'usd-quotes':
                    initUsdQuotesTab();
                    break;
            }

            initializedTabs.add(tab);
        }

        function isIndexOrEtf(symbol) {
            const displayName = symbol.displayName || '';
            const normalized = displayName
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '');

            return /\bETF\b/.test(displayName) || normalized.includes('indice');
        }

        function getRepresentativeSymbols(group) {
            if (group.representativeSymbol) {
                const configured = group.symbols.find(symbol => symbol.name === group.representativeSymbol);

                if (configured) {
                    return [configured];
                }
            }

            const representatives = group.symbols.filter(isIndexOrEtf);

            if (representatives.length) {
                return representatives;
            }

            if (group.name === 'Real Estate' && APP_DATA) {
                const realEstateEtfs = new Set(['AMEX:VNQ', 'AMEX:XLRE']);
                return APP_DATA.symbolsGroups
                    .flatMap(item => item.symbols)
                    .filter(symbol => realEstateEtfs.has(symbol.name));
            }

            return group.symbols.slice(0, 1);
        }

        function createSymbolOverview(symbolName, title) {
            const container = document.createElement('div');
            container.className = 'tradingview-widget-container';

            const widget = document.createElement('div');
            widget.className = 'tradingview-widget-container__widget';
            container.appendChild(widget);

            const script = document.createElement('script');
            script.type = 'text/javascript';
            script.async = true;
            script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js';
            script.innerHTML = JSON.stringify({
                lineWidth: 2,
                lineType: 0,
                chartType: "candlesticks",
                showVolume: true,
                fontColor: "rgb(106, 109, 120)",
                gridLineColor: "rgba(242, 242, 242, 0.06)",
                volumeUpColor: "rgba(34, 171, 148, 0.5)",
                volumeDownColor: "rgba(247, 82, 95, 0.5)",
                backgroundColor: "#0F0F0F",
                widgetFontColor: "#DBDBDB",
                upColor: "#22ab94",
                downColor: "#f7525f",
                borderUpColor: "#22ab94",
                borderDownColor: "#f7525f",
                wickUpColor: "#22ab94",
                wickDownColor: "#f7525f",
                colorTheme: "dark",
                isTransparent: false,
                locale: "es",
                chartOnly: true,
                scalePosition: "right",
                scaleMode: "Normal",
                fontFamily: "-apple-system, BlinkMacSystemFont, Trebuchet MS, Roboto, Ubuntu, sans-serif",
                valuesTracking: "1",
                changeMode: "price-and-percent",
                symbols: [
                    [
                        title,
                        `${symbolName}|3M`
                    ]
                ],
                dateRanges: [
                    "3m|1D"
                ],
                fontSize: "10",
                headerFontSize: "medium",
                autosize: true,
                dateFormat: "qq 'yy",
                width: "100%",
                height: "100%",
                noTimeScale: false,
                hideDateRanges: false,
                showMA: true,
                maLength: "20",
                maLineColor: "rgba(255, 241, 118, 0.5)",
                maLineWidth: 1
            }, null, 2);

            container.appendChild(script);
            return container;
        }

        function createTickerTag(symbolName) {
            const tag = document.createElement('tv-ticker-tag');
            tag.setAttribute('symbol', symbolName);
            tag.setAttribute('hide-background', '');
            tag.setAttribute('size', 'medium');
            tag.textContent = symbolName;
            tag.style.display = 'inline-block';
            tag.style.colorScheme = 'dark';
            return tag;
        }

        function initTickerTape(symbolNames) {
            const symbols = symbolNames
                .join(',');

            const container = document.getElementById('ticker-container');
            container.innerHTML = '';

            const script = document.createElement('script');
            script.type = 'module';
            script.src = 'https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js';
            container.appendChild(script);

            const ticker = document.createElement('tv-ticker-tape');
            ticker.setAttribute('symbols', symbols);
            ticker.setAttribute('item-size', 'compact');
            ticker.setAttribute('theme', 'dark');
            ticker.setAttribute('show-hover', '');
            ticker.setAttribute('hide-chart', '');

            container.appendChild(ticker);
        }

        function mountMarketQuotes(container, symbolsGroups) {
            const cfg = {
                colorTheme: "dark",
                locale: "es",
                isTransparent: false,
                showSymbolLogo: true,
                width: "100%",
                height: "100%",
                symbolsGroups: symbolsGroups
            };

            container.innerHTML = '<div class="tradingview-widget-container__widget"></div>';
            const s = document.createElement('script');
            s.src = 'https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js';
            s.async = true;
            s.innerHTML = JSON.stringify(cfg, null, 2);
            container.appendChild(s);
        }

        function initWatchlistSummary(symbolsGroups) {
            const container = document.getElementById('watchlist-container');
            container.innerHTML = '';

            const grid = document.createElement('div');
            grid.className = 'category-grid';

            symbolsGroups.forEach((group, index) => {
                const card = document.createElement('div');
                card.className = 'category-card';
                card.tabIndex = 0;
                card.setAttribute('role', 'button');
                card.addEventListener('click', () => showCategoryDetail(index));
                card.addEventListener('keydown', event => {
                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault();
                        showCategoryDetail(index);
                    }
                });

                const header = document.createElement('div');
                header.className = 'category-card-header';

                const cardTitle = document.createElement('div');
                cardTitle.className = 'category-card-title';
                cardTitle.textContent = group.name;

                header.appendChild(cardTitle);

                if (group.representativeSymbol) {
                    const tagHost = document.createElement('div');
                    tagHost.className = 'category-ticker-tag';
                    tagHost.appendChild(createTickerTag(group.representativeSymbol));
                    card.appendChild(tagHost);
                }

                card.appendChild(header);

                if (group.representativeSymbol) {
                    const chart = document.createElement('div');
                    chart.className = 'category-chart';
                    chart.appendChild(createSymbolOverview(group.representativeSymbol, group.name));
                    card.appendChild(chart);
                }

                grid.appendChild(card);
            });

            container.appendChild(grid);
        }

        function showCategoryDetail(groupIndex) {
            const group = APP_DATA.symbolsGroups[groupIndex];
            if (!group) return;

            const container = document.getElementById('watchlist-container');
            container.innerHTML = '';

            const toolbar = document.createElement('div');
            toolbar.className = 'watchlist-toolbar';

            const back = document.createElement('button');
            back.className = 'watchlist-back';
            back.type = 'button';
            back.textContent = '‹';
            back.title = 'Volver a categorías';
            back.addEventListener('click', () => initWatchlistSummary(APP_DATA.symbolsGroups));

            const title = document.createElement('div');
            title.className = 'watchlist-title';
            title.textContent = group.name;

            const subtitle = document.createElement('div');
            subtitle.className = 'watchlist-subtitle';
            subtitle.textContent = `${group.symbols.length} símbolos`;

            const detail = document.createElement('div');
            detail.className = 'watchlist-detail tradingview-widget-container';

            toolbar.appendChild(back);
            toolbar.appendChild(title);
            toolbar.appendChild(subtitle);
            container.appendChild(toolbar);
            container.appendChild(detail);

            mountMarketQuotes(detail, [group]);
        }

        function initAdvancedChart(symbolsGroups) {
            const symbolsList = symbolsGroups.flatMap(group => group.symbols.map(s => s.name));
            const cfg = {
                allow_symbol_change: true,
                calendar: false,
                details: true,
                hide_side_toolbar: false,
                hide_top_toolbar: false,
                hide_legend: false,
                hide_volume: false,
                hotlist: false,
                interval: "D",
                locale: "es",
                save_image: true,
                style: "1",
                symbol: "BCBA:IMV",
                theme: "dark",
                timezone: "America/Argentina/Buenos_Aires",
                backgroundColor: "#0F0F0F",
                gridColor: "rgba(242, 242, 242, 0.06)",
                watchlist: symbolsList,
                withdateranges: true,
                range: "12M",
                compareSymbols: [],
                studies: ["DM@tv-basicstudies", "OBV@tv-basicstudies"],
                autosize: true,
                support_host: "https://www.tradingview.com"
            };
            const s = document.createElement('script');
            s.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
            s.async = true;
            s.type = 'text/javascript';
            s.innerHTML = JSON.stringify(cfg, null, 2);
            document.getElementById('advanced-chart-container').appendChild(s);
        }

        function initStockHeatmap() {
            const cfg = {
                dataSource: "SPX500",
                blockSize: "market_cap_basic",
                blockColor: "change",
                grouping: "sector",
                locale: "es",
                colorTheme: "dark",
                width: "100%",
                height: "100%",
                hasTopBar: true,
                isDataSetEnabled: true,
                isZoomEnabled: true,

        function createSymbolCard(symbol, interval = "5") {
            const card = document.createElement('div');

            const quoteBar = document.createElement('div');
            quoteBar.className = 'symbol-quote-bar';

            const quoteContainer = document.createElement('div');
            quoteContainer.className = 'tradingview-widget-container';
            quoteContainer.dataset.role = 'quote';

            const quoteWidget = document.createElement('div');
            quoteWidget.className = 'tradingview-widget-container__widget';

            quoteContainer.appendChild(quoteWidget);
            quoteBar.appendChild(quoteContainer);
            card.appendChild(quoteBar);

            const chartArea = document.createElement('div');
            chartArea.className = 'symbol-chart-area';

            const chartContainer = document.createElement('div');
            chartContainer.className = 'tradingview-widget-container';
            chartContainer.dataset.role = 'chart';

            w.className = 'tradingview-widget-container__widget';

            chartContainer.appendChild(w);
            chartArea.appendChild(chartContainer);
            card.appendChild(chartArea);

            observeCard(card);
            return card;
        }

        async function initUsdQuotesTab() {
            const container = document.getElementById('usd-quotes');
            if (container.dataset.loaded) return;

            try {
                const res = await fetch('usd-quotes-widget.html', { cache: 'no-store' });
                const html = await res.text();

                const tmp = document.createElement('div');
                tmp.innerHTML = html;

                container.innerHTML = '';
                Array.from(tmp.childNodes).forEach(n => container.appendChild(n));

                const scripts = container.querySelectorAll('script');
                scripts.forEach(old => {
                    const s = document.createElement('script');

                    if (old.src) {
                        s.src = old.src;
                        s.async = old.async;
                    } else {
                        s.textContent = old.textContent;
                    }

                    old.replaceWith(s);
                });

                container.dataset.loaded = 'true';
            } catch (err) {
                container.innerHTML = "<p style='padding:20px;color:#aaa;'>Error al cargar el widget del dólar.</p>";
            }
        }

        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
                document.getElementById(tab).classList.add('active');

                ensureTabInitialized(tab);
            });
        });

        window.addEventListener('DOMContentLoaded', () => {
            initSymbols();

            const tabs = document.querySelector('.tabs');
            let isDown = false;
            let startX = 0;
            let scrollLeft = 0;

            tabs.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return;
                isDown = true;
                startX = e.pageX - tabs.offsetLeft;
                scrollLeft = tabs.scrollLeft;
            });

            window.addEventListener('mouseup', () => {
                isDown = false;
            });

            tabs.addEventListener('mouseleave', () => {
                isDown = false;
            });

            tabs.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - tabs.offsetLeft;
                const walk = x - startX;
                tabs.scrollLeft = scrollLeft - walk;
            });

            tabs.addEventListener('wheel', (e) => {
                if (!e.deltaY && !e.deltaX) return;
                e.preventDefault();
                tabs.scrollLeft += (Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY);
            }, { passive: false });

            if ('serviceWorker' in navigator) {
                fetch('sw.js', { method: 'HEAD' })
                    .then(res => {
                        if (res.ok) {
                            navigator.serviceWorker.register('sw.js', { scope: './' });
                        }
                    })
                    .catch(() => { });
            }
        });
    </script>
