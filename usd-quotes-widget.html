<div class="usd-quotes-tab-wrap">
  <header class="usd-quotes-header">
    <div class="usd-quotes-heading">
      <div class="usd-quotes-kicker">Macro</div>
      <h2>Dolar USD/ARS</h2>
    </div>
    <div class="usd-quotes-meta" id="usd-last-update">Actualizando...</div>
  </header>

  <section id="cards" class="usd-quotes-grid" aria-label="Cotizaciones del dolar"></section>
  <section id="usd-tv-grid" class="usd-tv-grid" aria-label="Graficos USD/ARS"></section>

  <script>
    const USD_TV_SYMBOLS = [
      { name: "USDARS", shortName: "Dolar oficial" },
      { name: "BCBA:AL30/BCBA:AL30D", shortName: "Dolar MEP (AL30)" },
      { name: "BCBA:AL30/BCBA:AL30C", shortName: "Dolar CCL (AL30)" },
      { name: "BINANCE:USDTARS", shortName: "Dolar cripto" }
    ];

    const CURRENTVALUE_ENDPOINT = (tipo) => `https://dolarapi.com/v1/dolares/${tipo}`;
    const PREVIOUSVALUE_ENDPOINT = (tipo, ymdSlash) => `https://api.argentinadatos.com/v1/cotizaciones/dolares/${tipo}/${ymdSlash}`;

    const REFRESH_MS = 300000;
    const MAX_LOOKBACK_DAYS = 10;
    const USD_TYPE = ['oficial', 'mayorista', 'blue', 'bolsa', 'contadoconliqui', 'cripto', 'tarjeta'];

    const USD_DISPLAY_NAME = {
      oficial: 'Dolar oficial',
      blue: 'Dolar blue',
      bolsa: 'Dolar MEP',
      contadoconliqui: 'Dolar CCL',
      mayorista: 'Dolar mayorista',
      tarjeta: 'Dolar tarjeta',
      cripto: 'Dolar cripto'
    };

    const $cards = document.getElementById('cards');
    const $lastUpdate = document.getElementById('usd-last-update');
    const refs = new Map();

    const n = (x) => {
      const v = parseFloat(x);
      return Number.isFinite(v) ? v : null;
    };

    const fmtARS = (v) => Number.isFinite(v)
      ? '$ ' + v.toLocaleString('es-AR', { maximumFractionDigits: 2 })
      : '-';

    const fmtDate24 = (d) =>
      new Date(d).toLocaleString('es-AR', {
        hour12: false,
        timeZone: 'America/Argentina/Buenos_Aires'
      });

    const toYMD_slash = (date) => {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}/${m}/${d}`;
    };

    async function fetchJSON(url) {
      try {
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } catch (e) {
        console.error('fetchJSON error:', url, e);
        return null;
      }
    }

    async function getPreviousQuote(tipo, baseDate) {
      for (let i = 1; i <= MAX_LOOKBACK_DAYS; i++) {
        const dt = new Date(baseDate);
        dt.setDate(dt.getDate() - i);
        const ymdSlash = toYMD_slash(dt);
        const data = await fetchJSON(PREVIOUSVALUE_ENDPOINT(tipo, ymdSlash));
        if (data) {
          const compra = n(data.compra);
          const venta = n(data.venta);
          if (compra !== null || venta !== null) {
            return { compra, venta, date: data.fecha || ymdSlash };
          }
        }
      }
      return null;
    }

    function initUsdMiniChartsOnce() {
      const host = document.getElementById('usd-tv-grid');
      if (!host || host.dataset.loaded === 'true') return;

      host.innerHTML = '';
      USD_TV_SYMBOLS.forEach(symbol => {
        const card = document.createElement('article');
        card.className = 'category-card usd-chart-card';

        const header = document.createElement('div');
        header.className = 'category-card-header';

        const title = document.createElement('div');
        title.className = 'category-card-title';
        title.textContent = symbol.shortName;
        title.title = symbol.name;
        header.appendChild(title);

        const tagHost = document.createElement('div');
        tagHost.className = 'category-ticker-tag';
        tagHost.appendChild(createTickerLink(symbol.name));
        card.appendChild(tagHost);
        card.appendChild(header);

        const chart = document.createElement('div');
        chart.className = 'category-chart is-loading';
        chart.appendChild(createSymbolOverview(symbol.name, symbol.shortName));
        card.appendChild(chart);

        host.appendChild(card);
      });

      host.dataset.loaded = 'true';
    }

    function createCard(tipo) {
      const el = document.createElement('article');
      el.className = 'usd-quote-card';
      el.innerHTML = `
        <div class="usd-card-topline">
          <h3 class="usd-card-title" id="${tipo}-title">${USD_DISPLAY_NAME[tipo] || tipo}</h3>
          <span class="usd-card-badge" id="${tipo}-sell-change">-</span>
        </div>
        <div class="usd-card-values">
          <div class="usd-value-group">
            <span class="usd-label">Compra</span>
            <span class="usd-value" id="${tipo}-buy">-</span>
          </div>
          <div class="usd-value-group">
            <span class="usd-label">Venta</span>
            <span class="usd-value" id="${tipo}-sell">-</span>
          </div>
        </div>
        <div class="usd-gap" id="${tipo}-gap">Brecha con oficial: -</div>
      `;
      $cards.appendChild(el);
      refs.set(tipo, {
        buy: el.querySelector(`#${tipo}-buy`),
        sell: el.querySelector(`#${tipo}-sell`),
        sellChange: el.querySelector(`#${tipo}-sell-change`),
        gap: el.querySelector(`#${tipo}-gap`),
        title: el.querySelector(`#${tipo}-title`)
      });
    }

    function ensureCards() {
      if (refs.size === USD_TYPE.length) return;
      $cards.innerHTML = '';
      refs.clear();
      USD_TYPE.forEach(createCard);
    }

    function setTrend(el, diff) {
      el.classList.toggle('up', diff > 0);
      el.classList.toggle('down', diff < 0);
      el.classList.toggle('flat', diff === 0);
    }

    function isObject(x) {
      return x && typeof x === 'object' && !Array.isArray(x);
    }

    async function load() {
      initUsdMiniChartsOnce();
      ensureCards();
      $lastUpdate.textContent = 'Actualizando...';

      const baseDate = new Date();
      const oficialNow = await fetchJSON(CURRENTVALUE_ENDPOINT('oficial'));
      const oficialVenta = isObject(oficialNow) ? n(oficialNow.venta) : null;

      await Promise.all(USD_TYPE.map(async (tipo) => {
        const r = refs.get(tipo);
        if (!r) return;

        const now = await fetchJSON(CURRENTVALUE_ENDPOINT(tipo));
        if (!isObject(now)) {
          r.buy.textContent = '-';
          r.sell.textContent = '-';
          r.sellChange.textContent = 'Sin datos';
          r.buy.className = 'usd-value';
          r.sell.className = 'usd-value';
          r.sellChange.className = 'usd-card-badge';
          return;
        }

        const nowCompra = n(now.compra);
        const nowVenta = n(now.venta);

        r.buy.textContent = fmtARS(nowCompra);
        r.sell.textContent = fmtARS(nowVenta);

        if (Number.isFinite(oficialVenta) && tipo !== 'oficial' && Number.isFinite(nowVenta)) {
          const g = ((nowVenta - oficialVenta) / oficialVenta) * 100;
          r.gap.textContent = `Brecha con oficial: ${g >= 0 ? '+' : ''}${g.toFixed(2)}%`;
        } else {
          r.gap.textContent = 'Brecha con oficial: -';
        }

        const prev = await getPreviousQuote(tipo, baseDate);
        const prevVenta = n(prev?.venta);

        if (Number.isFinite(nowVenta) && Number.isFinite(prevVenta)) {
          const diff = nowVenta - prevVenta;
          const pct = (diff / prevVenta) * 100;
          r.sellChange.textContent = diff === 0
            ? '= 0.00%'
            : `${pct > 0 ? '+' : ''}${pct.toFixed(2)}%`;

          setTrend(r.buy, diff);
          setTrend(r.sell, diff);
          r.sellChange.classList.toggle('up', diff > 0);
          r.sellChange.classList.toggle('down', diff < 0);
          r.sellChange.classList.toggle('flat', diff === 0);
        } else {
          r.sellChange.textContent = '-';
          r.buy.classList.remove('up', 'down', 'flat');
          r.sell.classList.remove('up', 'down', 'flat');
          r.sellChange.classList.remove('up', 'down', 'flat');
        }
      }));

      $lastUpdate.textContent = `Actualizado: ${fmtDate24(new Date())}`;
    }

    (async () => {
      try {
        await load();
      } catch (e) {
        console.error('load error', e);
        $lastUpdate.textContent = 'Error al actualizar';
      }
      setInterval(() => load().catch((e) => {
        console.error('refresh error', e);
        $lastUpdate.textContent = 'Error al actualizar';
      }), REFRESH_MS);
    })();
  </script>
</div>

<style>

    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: #0f1115;
    overflow: auto;
  }

  .usd-quotes-header {
    position: sticky;
    top: 0;
    z-index: 5;
    display: flex;

    justify-content: space-between;
    gap: 12px;
    min-height: 64px;
    padding: 9px 16px;
    border-bottom: 1px solid rgba(82, 96, 122, 0.28);
    background: rgba(13, 17, 24, 0.96);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    backdrop-filter: blur(10px);
  }

  .usd-quotes-heading {
    min-width: 0;
  }

  .usd-quotes-kicker {
    color: #78b8ff;

  }

  }

  .usd-label {

  .usd-value {

  }

  .usd-gap {

  }

  .usd-value.up,
  .usd-card-badge.up {

  }

  .usd-value.down,
  .usd-card-badge.down {

  @media (min-width: 760px) {

      grid-template-columns: repeat(2, minmax(0, 1fr));

    .usd-tv-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));

    }
  }

  @media (min-width: 1400px) {

      grid-template-columns: repeat(4, minmax(0, 1fr));

    .usd-tv-grid {

    }
  }

  @media (max-width: 899px) {

      min-height: 62px;
      padding: 8px 10px;
    }

    .usd-quotes-meta {
      display: none;
    }

    .usd-quotes-grid,
    .usd-tv-grid {
      gap: 10px;
      padding: 10px 10px 0;
    }

    .usd-tv-grid {
      grid-auto-rows: 300px;

    }
  }
</style>
